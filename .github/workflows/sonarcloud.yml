name: SonarCloud Scan
on: [push, pull_request]

jobs:
  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Run SonarScanner CLI
        env:
          SONAR_TOKEN: ${{ secrets.CTSE }}
        run: |
          set -e
          SCANNER_VERSION=4.8.1.3023
          ARCHIVE=sonar-scanner-cli-${SCANNER_VERSION}-linux.zip
          URL="https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/${ARCHIVE}"
          echo "Downloading SonarScanner ${SCANNER_VERSION}..."
          curl -sSLo ${ARCHIVE} ${URL}
          unzip -q ${ARCHIVE}
          # find the extracted scanner directory (first match)
          SCANNER_DIR=$(ls -d sonar-scanner-cli-*/ | head -n1)
          echo "Using scanner dir: ${SCANNER_DIR}"
          # ensure executable
          chmod +x "${SCANNER_DIR}bin/sonar-scanner"
          # run scanner by full path to avoid PATH issues
          "${SCANNER_DIR}bin/sonar-scanner" \
            -Dsonar.organization=asho-1308 \
            -Dsonar.projectKey=asho-1308_ctse-assignment-1 \
            -Dsonar.login=${SONAR_TOKEN}
