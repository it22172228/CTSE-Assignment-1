name: SonarCloud Scan
on: [push, pull_request]

jobs:
  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Run SonarScanner CLI
        env:
          SONAR_TOKEN: ${{ secrets.CTSE }}
        run: |
          set -e
          # Explicitly set JAVA_HOME to Java 17 provided by actions/setup-java
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$JAVA_HOME/bin:$PATH
          
          SCANNER_VERSION=4.8.1.3023
          ARCHIVE=sonar-scanner-cli-${SCANNER_VERSION}-linux.zip
          URL="https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/${ARCHIVE}"
          echo "Downloading SonarScanner ${SCANNER_VERSION}..."
          curl -sSLo ${ARCHIVE} ${URL}
          echo "Extracting..."
          unzip -o -q ${ARCHIVE}
          # Show contents for debugging
          ls -F
          SCANNER_DIR=$(ls -d sonar-scanner-*/ 2>/dev/null | head -n1 || ls -d sonar-scanner-cli-*/ 2>/dev/null | head -n1)
          if [ -z "$SCANNER_DIR" ]; then
            echo "Error: Could not find scanner directory after unzip"
            exit 1
          fi
          echo "Using scanner dir: ${SCANNER_DIR}"
          echo "Java version being used:"
          java -version
          
          chmod +x "${SCANNER_DIR}bin/sonar-scanner"
          "${SCANNER_DIR}bin/sonar-scanner" \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=asho-1308 \
            -Dsonar.projectKey=asho-1308_ctse-assignment-1 \
            -Dsonar.login=${SONAR_TOKEN}
