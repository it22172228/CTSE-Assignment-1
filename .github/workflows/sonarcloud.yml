name: SonarCloud Scan
on: [push, pull_request]

jobs:
  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Run SonarScanner CLI
        env:
          SONAR_TOKEN: ${{ secrets.CTSE }}
        run: |
          set -e
          # SONAR_JAVA_PATH is documentation for some versions, but setting it explicitly helps
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$JAVA_HOME/bin:$PATH
          export SONAR_JAVA_PATH="$JAVA_HOME/bin/java"
          
          SCANNER_VERSION=4.8.1.3023
          ARCHIVE=sonar-scanner-cli-${SCANNER_VERSION}-linux.zip
          URL="https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/${ARCHIVE}"
          echo "Downloading SonarScanner ${SCANNER_VERSION}..."
          curl -sSLo ${ARCHIVE} ${URL}
          echo "Extracting..."
          unzip -o -q ${ARCHIVE}
          
          SCANNER_DIR=$(ls -d sonar-scanner-*/ 2>/dev/null | head -n1 || ls -d sonar-scanner-cli-*/ 2>/dev/null | head -n1)
          
          # CRITICAL: The scanner often looks at the 'java' command in its own properties.
          # We will force the scanner to use the setup-java version by overriding the property file
          echo "sonar.java.jdkHome=$JAVA_HOME" >> "${SCANNER_DIR}conf/sonar-scanner.properties"
          
          echo "Using scanner dir: ${SCANNER_DIR}"
          echo "Java version being used by shell:"
          java -version
          
          chmod +x "${SCANNER_DIR}bin/sonar-scanner"
          "${SCANNER_DIR}bin/sonar-scanner" \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=asho-1308 \
            -Dsonar.projectKey=asho-1308_ctse-assignment-1 \
            -Dsonar.login=${SONAR_TOKEN} \
            -Dsonar.scanner.skipJreProvisioning=true
