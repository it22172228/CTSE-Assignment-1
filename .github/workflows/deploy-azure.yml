# GitHub Actions CI/CD Pipeline for Azure Container Apps Deployment
name: Deploy to Azure Container Apps

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: smarteatregistry.azurecr.io
  RESOURCE_GROUP: smarteat-rg
  CONTAINER_APP_ENV: smarteat-env
  LOCATION: eastus

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - service: user-service
            context: ./services/user-service
            app: user-app
          - service: restaurant-service
            context: ./services/restaurant-service
            app: restaurant-app
          - service: order-service
            context: ./services/order-service
            app: order-app
          - service: notification-service
            context: ./services/notification-service
            app: notification-app
          - service: frontend
            context: ./frontend
            app: frontend-app
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ env.REGISTRY }}
        username: ${{ secrets.AZURE_CLIENT_ID }}
        password: ${{ secrets.AZURE_CLIENT_SECRET }}
    
    - name: Build and push image
      uses: docker/build-push-action@v4
      with:
        context: ${{ matrix.context }}
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
          ${{ env.REGISTRY }}/${{ matrix.service }}:latest
    
    - name: Azure login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Deploy to Container Apps
      run: |
        az containerapp update \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --name ${{ matrix.app }} \
          --image ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }}

