# GitHub Actions CI/CD Pipeline for Azure Container Apps Deployment
name: Deploy to Azure Container Apps

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: yourregistryname.azurecr.io
  RESOURCE_GROUP: your-resource-group
  CONTAINER_APP_ENV: your-container-app-env
  LOCATION: eastus

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service: [user-service, restaurant-service, order-service, notification-service, frontend]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ env.REGISTRY }}
        username: ${{ secrets.AZURE_CLIENT_ID }}
        password: ${{ secrets.AZURE_CLIENT_SECRET }}
    
    - name: Build and push image
      uses: docker/build-push-action@v4
      with:
        context: ./services/${{ matrix.service }}
        push: true
        tags: ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
        tags: ${{ env.REGISTRY }}/${{ matrix.service }}:latest
    
    - name: Azure login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Deploy to Container Apps
      run: |
        az containerapp update \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --name ${{ matrix.service }} \
          --image ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }}

  deploy-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ env.REGISTRY }}
        username: ${{ secrets.AZURE_CLIENT_ID }}
        password: ${{ secrets.AZURE_CLIENT_SECRET }}
    
    - name: Build and push frontend image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: true
        tags: ${{ env.REGISTRY }}/frontend:${{ github.sha }}
        tags: ${{ env.REGISTRY }}/frontend:latest
    
    - name: Azure login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Deploy frontend to Container Apps
      run: |
        az containerapp update \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --name frontend \
          --image ${{ env.REGISTRY }}/frontend:${{ github.sha }}
